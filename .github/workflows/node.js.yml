name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job kiểm tra Frontend
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Chỉ định thư mục làm việc cho toàn bộ job

    strategy:
      matrix:
        node-version: [20.x] # Có thể dùng 18.x, 20.x, 22.x nếu cần kiểm tra đa phiên bản

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        # Sửa lỗi không tìm thấy lock file bằng cách chỉ định đường dẫn cụ thể
        cache-dependency-path: ./frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run Lint
      run: npm run lint --if-present

    - name: Build project
      run: npm run build --if-present

    - name: Run Tests
      # --if-present giúp bỏ qua lỗi nếu package.json chưa có script test
      run: npm test --if-present

  # Job kiểm tra Backend
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: ./backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build --if-present

    - name: Run Tests
      run: npm test --if-present
